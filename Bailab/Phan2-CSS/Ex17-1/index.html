<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Exercise 17-1: Transitions</title>
	<link rel="stylesheet" href="style.css">
</head>
<style>
body
{
font-family: Tahoma, Verdana, Genev6, sans-serif;
margin: 6em;
font-weight: bold;;

}

ul 
{
	list-style-type:none;
  margin: 0;
  padding: 0;
}
li
{
	float: left;
}

{

	border-radius: 6px;
	text-shadow: 2px 3px 4px #666;
	box-shadow: 2px 3px 4px yellow;
	position: relative;

	
	display: block;
	width : 6em;
	height: 4em;


}
</style>
<body>
	<ul>
		<li><a href="">Men</a></li>
		<li><a href="">Women</a></li>

	</ul>
